<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="split-container">
        <!-- Panel Izquierdo: 55% -->
        <div class="left-panel">
            <!-- Capa con el color de fondo y transparencia -->
            <div class="overlay"></div>
            
            <div class="content">
                <h1>Crea tu cuenta</h1>
                <p>Únete a nuestra comunidad y descubre herramientas exclusivas diseñadas para tu bienestar emocional y mental.</p>
            </div>
        </div>

        <!-- Panel Derecho: 45% -->
        <div class="right-panel">
            <div class="login-wrapper">
                <div class="login-header">
                    <h2>Ingresa tus datos</h2>
                    <p>Completa tus datos para continuar</p>
                </div>
                <form class="register-form">
                    <div class="input-group">
                        <label for="name">Nombre Completo</label>
                        <input type="text" id="name" placeholder="Tu nombre verdadero" required>
                    </div>
                    <div class="input-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <div class="input-group">
                        <label for="confirm-password">Confirmar Contraseña</label>
                        <input type="password" id="confirm-password" placeholder="••••••••" required>
                    </div>
                    
                    <div class="form-actions" style="margin-top: 5px;">
                        <label class="remember-me">
                            <input type="checkbox" id="terms" required> Acepto los términos y condiciones
                        </label>
                    </div>
                    
                    <button type="submit" class="boton boton-candy">
                        Registrarse
                    </button>
                    
                    <div class="social-login-separator">
                        <span>o regístrate con</span>
                    </div>

                    <div class="social-login-buttons">
                        <button type="button" class="social-btn">
                            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/google/google-original.svg" alt="Google">
                            Google
                        </button>
                        <button type="button" class="social-btn">
                            <svg width="20" height="20" viewBox="0 0 384 512" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.3 48.6-.8 90.4-86.8 102.8-125.2-48.4-19.5-62-60.8-61.9-85.4zM201.5 106.7c18-21.7 29.5-52.6 26.2-82.7-27.4 1.1-59.5 18-77.9 39.8-15.8 18-28.7 49-25.2 78.4 29.9 2.3 58.9-13.8 76.9-35.5z"/></svg>
                            Apple
                        </button>
                    </div>
                    
                    <p class="register-prompt">¿Ya tienes una cuenta? <a href="../login/login.html">Inicia sesión aquí</a></p>
                </form>
            </div>
        </div>
    </div>
    <script type="module" src="register.js"></script>
</body>
</html>
